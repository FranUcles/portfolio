name: Deploy Portfolio

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh

          cat > ~/.ssh/config <<EOF
          Host deploy
              HostName ssh.franucles.com
              IdentityFile ~/.ssh/portfolio-deploy
              User portfolio-deploy
              StrictHostKeyChecking no
              ProxyCommand cloudflared access ssh --hostname %h
          EOF

          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/portfolio-deploy
          chmod 600 ~/.ssh/portfolio-deploy

          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          
      - name: Deploy
        env:
          TUNNEL_SERVICE_TOKEN_ID: ${{ secrets.TUNNEL_SERVICE_TOKEN_ID }}
          TUNNEL_SERVICE_TOKEN_SECRET: ${{ secrets.TUNNEL_SERVICE_TOKEN_SECRET }}
        run: |
          rsync -az --delete dist/ deploy:~/web
